<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>

    <link rel="stylesheet" href="product.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav>
    <div class="nav-header">

        <!-- LOGO (FIXED ROUTING) -->
        <a href="index.html">
            <img src="assets/nav-header 1/Bmday_logo.png" width="100" alt="BMDAY logo">
        </a>

        <p>Sign In</p>

        <div class="nav-search-tab">
            <img src="assets/nav-header 1/search_icon.png" width="30" alt="Search Icon">
            <input type="text" placeholder="Search for items at Bmday">
        </div>

        <div class="nav-icon">
            <img src="assets/nav-header 1/cart_icon.png" width="30" alt="Cart icon">
            <span>Cart</span>
        </div>

    </div>
</nav>


<!-- ================= TOY SECTION ================= -->
<section id="toys-section">

    <h2>Toy Collections Under KSh 3200</h2>

    <div id="toys" class="Product-Collection">
  <!-- JS WILL RENDER ALL 15 PRODUCTS HERE -->
    </div>

</section>
<!--Latest Devices-->
<section id="devices-section">

    <h2>Latest Devices</h2>

    <div id="devices" class="Product-Collection">
        <!-- JS WILL RENDER HERE -->
    </div>

</section>

<!-- ================= FASHION SECTION ================= -->
<section id="fashion-section">

    <h2>Fashion Trends Collection</h2>

    <div id="fashion-packages" class=" Product-Collection">
        
    </div>

</section>

<!-- Deodorants & Perfumes -->
<section id="deodorants-perfumes-section">

    <h2>Deodorants & Perfumes</h2>

    <div id="deodorants-packages" class="Product-Collection">
        <!-- JS WILL RENDER PRODUCTS HERE -->
    </div>

</section>

<!-- ================= MODAL ================= -->
<div id="buyNowModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeBuyNow()">&times;</span>

        <img id="modalImage" width="200" alt="Product image">
        <h2 id="modalName"></h2>
        <p id="modalPrice"></p>

        <button onclick="confirmPurchase()">Confirm Purchase</button>

    </div>

</div>


<!-- ================= SCRIPT ================= -->
<script src="products.js"></script>

</body>
</html>
